<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Format</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <style>
    :root {
      --primary: #0078d4;
      --primary-dark: #005a9e;
      --surface: #f3f2f1;
      --border: #d2d0ce;
      --text: #201f1e;
      --text-light: #605e5c;
      --success: #107c10;
      --danger: #d13438;
      --radius: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: var(--text);
      background: #fff;
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 { font-size: 13px; font-weight: 600; }
    header p  { font-size: 10px; opacity: 0.85; margin-top: 1px; }

    .content {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      background: var(--surface);
      padding: 5px 10px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-light);
      border-bottom: 1px solid var(--border);
    }

    .card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 11px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,120,212,0.15);
    }

    input[type="color"] {
      width: 32px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
      cursor: pointer;
    }

    .row { display: flex; gap: 6px; align-items: flex-end; }
    .row > * { flex: 1; }

    .color-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .color-item  { display: flex; align-items: center; gap: 4px; font-size: 11px; }

    .btn {
      padding: 6px 10px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      flex: 1;
    }
    .btn-secondary:hover:not(:disabled) { background: #e1dfdd; }

    .btn-danger {
      background: #fdf3f4;
      color: var(--danger);
      border: 1px solid #f4b8ba;
      flex: 1;
    }
    .btn-danger:hover:not(:disabled) { background: #fce8e9; }

    .btn-row { display: flex; gap: 6px; }

    .presets { display: flex; flex-wrap: wrap; gap: 4px; }
    .presets .btn {
      flex: 0 0 auto;
      font-size: 11px;
      padding: 3px 7px;
    }

    .rule-list { display: flex; flex-direction: column; gap: 5px; }

    .rule-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .rule-swatch {
      width: 12px; height: 12px;
      border-radius: 2px;
      border: 1px solid rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    .rule-desc { flex: 1; min-width: 0; }
    .rule-name {
      font-weight: 600; font-size: 11px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rule-detail { font-size: 10px; color: var(--text-light); margin-top: 1px; }

    .rule-delete {
      border: none; background: none; cursor: pointer;
      color: var(--text-light); font-size: 14px;
      padding: 0 2px; border-radius: 3px;
      flex-shrink: 0;
    }
    .rule-delete:hover { color: var(--danger); background: #fdf3f4; }

    .empty-state {
      text-align: center; padding: 12px 8px;
      color: var(--text-light); font-size: 11px;
    }

    #status {
      margin: 0 10px 8px;
      padding: 6px 10px;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 500;
      display: none;
      border-left: 3px solid;
    }
    #status.show    { display: block; }
    #status.success { background: #dff6dd; border-color: var(--success); color: #0b5e0b; }
    #status.error   { background: #fde7e9; border-color: var(--danger);  color: #8c1c1e; }
    #status.info    { background: #e8f3fb; border-color: var(--primary);  color: #004578; }

    .badge {
      display: inline-block; padding: 1px 6px;
      border-radius: 10px; font-size: 10px; font-weight: 600;
    }
    .badge-blue { background: #deecf9; color: #005a9e; }

    .hint {
      font-size: 10px; color: var(--text-light); line-height: 1.4;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🎨 Smart Format</h1>
    <p>Non-volatile conditional formatting</p>
  </div>
</header>

<div id="status"></div>

<div class="content">

  <div class="card">
    <div class="card-header">Target Range</div>
    <div class="card-body">
      <label for="rangeInput">Range (e.g. A1:D50)</label>
      <div class="row">
        <input type="text" id="rangeInput" placeholder="A1:D50"/>
        <button class="btn btn-secondary" id="btnPickRange" style="flex:0 0 auto;padding:5px 8px;font-size:11px;">
          📌 Use Selection
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Add Rule</div>
    <div class="card-body">

      <div>
        <label for="ruleType">Condition</label>
        <select id="ruleType">
          <option value="greaterThan">Greater than</option>
          <option value="lessThan">Less than</option>
          <option value="equalTo">Equal to</option>
          <option value="between">Between</option>
          <option value="notEqualTo">Not equal to</option>
          <option value="textContains">Text contains</option>
          <option value="blank">Blank cells</option>
          <option value="notBlank">Non-blank cells</option>
          <option value="top10">Top N values</option>
          <option value="bottom10">Bottom N values</option>
          <option value="aboveAverage">Above average</option>
          <option value="belowAverage">Below average</option>
          <option value="duplicate">Duplicate values</option>
          <option value="unique">Unique values</option>
          <option value="colorScale">Color scale (low→high)</option>
          <option value="dataBar">Data bars</option>
        </select>
      </div>

      <div id="valueFields">
        <div id="value1Row">
          <label for="ruleValue1" id="value1Label">Value</label>
          <input type="text" id="ruleValue1" placeholder="e.g. 100"/>
        </div>
        <div id="value2Row" style="display:none;margin-top:6px;">
          <label for="ruleValue2">And</label>
          <input type="text" id="ruleValue2" placeholder="e.g. 200"/>
        </div>
      </div>

      <div id="colorSection">
        <label>Formatting</label>
        <div class="color-group">
          <div class="color-item">
            <input type="color" id="bgColor" value="#FFEB9C"/>
            <span>Fill</span>
          </div>
          <div class="color-item">
            <input type="color" id="fontColor" value="#9C5700"/>
            <span>Font</span>
          </div>
          <div class="color-item">
            <input type="checkbox" id="boldCheck" style="width:14px;height:14px;cursor:pointer;"/>
            <span>Bold</span>
          </div>
        </div>
      </div>

      <div>
        <label>Quick Presets</label>
        <div class="presets">
          <button class="btn btn-secondary" onclick="applyPreset('red')">🔴 Red</button>
          <button class="btn btn-secondary" onclick="applyPreset('yellow')">🟡 Yellow</button>
          <button class="btn btn-secondary" onclick="applyPreset('green')">🟢 Green</button>
          <button class="btn btn-secondary" onclick="applyPreset('blue')">🔵 Blue</button>
          <button class="btn btn-secondary" onclick="applyPreset('none')">⬜ None</button>
        </div>
      </div>

      <button class="btn btn-primary" id="btnAddRule">+ Add Rule</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Saved Rules</span>
      <span class="badge badge-blue" id="ruleCount">0</span>
    </div>
    <div class="card-body">
      <div class="empty-state" id="emptyState">No rules yet. Add one above.</div>
      <div class="rule-list" id="ruleList"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Actions</div>
    <div class="card-body">
      <button class="btn btn-primary" id="btnApply">▶ Apply Formatting Now</button>
      <div class="btn-row" style="margin-top:5px;">
        <button class="btn btn-secondary" id="btnClearFormat">Clear Formatting</button>
        <button class="btn btn-danger" id="btnClearRules">Clear All Rules</button>
      </div>
      <p class="hint" style="margin-top:4px;">
        ✅ Formatting is applied once and won't slow down your workbook. Re-click Apply when data changes.
      </p>
    </div>
  </div>

</div>

<script src="taskpane.js"></script>
</body>
</html>
